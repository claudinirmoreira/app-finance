<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinançasPessoais - Controle Financeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/variables.css">
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/layout.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/utilities.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar__brand">
        <span class="sidebar__logo">💰</span>
        <h1 class="sidebar__title">FinançasPessoais</h1>
      </div>
      <nav class="sidebar__nav" role="navigation" aria-label="Menu principal">
        <ul class="sidebar__menu">
          <li>
            <a href="#dashboard" class="sidebar__link sidebar__link--active" data-route="dashboard">
              <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="#transactions" class="sidebar__link" data-route="transactions">
              <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 21l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
              <span>Transações</span>
            </a>
          </li>
          <li>
            <a href="#accounts" class="sidebar__link" data-route="accounts">
              <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
              <span>Contas</span>
            </a>
          </li>
          <li>
            <a href="#categories" class="sidebar__link" data-route="categories">
              <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h6v6H4z"/><path d="M14 4h6v6h-6z"/><path d="M4 14h6v6H4z"/><path d="M17 14v6"/><path d="M14 17h6"/></svg>
              <span>Categorias</span>
            </a>
          </li>
          <li>
            <a href="#budgets" class="sidebar__link" data-route="budgets">
              <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
              <span>Orçamentos</span>
            </a>
          </li>
          <li>
            <a href="#reports" class="sidebar__link" data-route="reports">
              <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
              <span>Relatórios</span>
            </a>
          </li>
        </ul>
      </nav>
      <div class="sidebar__footer">
        <button class="sidebar__toggle" id="sidebar-toggle" aria-label="Recolher menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>
    </aside>

    <main id="main-content" class="main">
      <header class="header">
        <div class="header__left">
          <button class="header__menu-btn" id="mobile-menu-btn" aria-label="Abrir menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <h2 class="header__title" id="page-title">Dashboard</h2>
        </div>
        <div class="header__right">
          <div class="header__month-selector">
            <button class="btn btn--icon" id="prev-month" aria-label="Mês anterior">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span class="header__current-month" id="current-month"></span>
            <button class="btn btn--icon" id="next-month" aria-label="Próximo mês">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
          <button class="btn btn--primary" id="add-transaction-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 5v14M5 12h14"/></svg>
            <span>Nova Transação</span>
          </button>
        </div>
      </header>

      <section id="app-content" class="content">
        <!-- Views are rendered here dynamically -->
      </section>
    </main>

    <div id="modal-overlay" class="modal-overlay" aria-hidden="true">
      <div class="modal" id="modal" role="dialog" aria-labelledby="modal-title">
        <div class="modal__header">
          <h3 class="modal__title" id="modal-title">Nova Transação</h3>
          <button class="modal__close" id="modal-close" aria-label="Fechar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="modal__body" id="modal-body">
          <!-- Dynamic form content -->
        </div>
      </div>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>
  </div>

  <script type="module" src="src/js/app.js"></script>
</body>
</html>
